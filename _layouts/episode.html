---
layout: default
---

<article>
  <header>
    <h2>{{ page.title }}</h2>
    <p>Source URL: <a href="{{ page.source_url }}" target="_blank">{{ page.source_url }}</a></p>
  </header>
  <section class="spotify-embed">
    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/{{ page.spotify_id }}?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </section>
  <hr>
  <div class="content">
    {{ content }}
  </div>
</article>
